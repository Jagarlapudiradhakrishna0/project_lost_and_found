name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install Backend Dependencies
        run: cd backend && npm install
        continue-on-error: true
      
      - name: Run Backend Lint
        run: cd backend && npm run lint
        continue-on-error: true
      
      - name: Run Backend Tests
        run: cd backend && npm test
        continue-on-error: true

  frontend-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Dependencies
        run: cd frontend && npm install
        continue-on-error: true
      
      - name: Run Frontend Lint
        run: cd frontend && npm run lint
        continue-on-error: true
      
      - name: Build Frontend
        run: cd frontend && npm run build
        continue-on-error: true

  validation:
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: always()
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate Project Structure
        run: |
          echo "Checking project files..."
          [ -f README.md ] && echo "✓ README.md found" || echo "✗ README.md missing"
          [ -f INSTALL.md ] && echo "✓ INSTALL.md found" || echo "✗ INSTALL.md missing"
          [ -f API_DOCUMENTATION.md ] && echo "✓ API_DOCUMENTATION.md found" || echo "✗ API_DOCUMENTATION.md missing"
          [ -f docker-compose.yml ] && echo "✓ docker-compose.yml found" || echo "✗ docker-compose.yml missing"
          [ -d backend ] && echo "✓ backend directory found" || echo "✗ backend directory missing"
          [ -d frontend ] && echo "✓ frontend directory found" || echo "✗ frontend directory missing"
        continue-on-error: true
      
      - name: Pipeline Summary
        run: echo "✅ CI/CD Pipeline validation complete"
        continue-on-error: true

